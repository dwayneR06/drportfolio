<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Dwayne Riedewald</title>
  <meta name="description" content="Get in touch with Lena Voss." />
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="contact.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <nav>
    <div class="nav-inner">
      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main id="main">
    <section class="page-header">
      <div class="container">
        <span class="eyebrow">Get in touch</span>
        <h1>Contact Me</h1>
        <p class="page-sub">Have a project in mind? I'd love to hear from you.</p>
      </div>
    </section>

    <section class="experience">
      <div class="container">
        <div class="about-intro-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items:start;">

          <div class="fade-in">
            <span class="eyebrow">Let's connect</span>
            <h2>Say hello</h2>
            <div class="divider"></div>
            <p>I'm currently open to internship opportunities</p>
            <div class="bio-details" style="margin-top:2rem;">
              <div class="bio-detail"><i class="fa-solid fa-envelope"></i> d.riedewald@unasat.sr</div>
              <div class="bio-detail"><i class="fa-solid fa-location-dot"></i> Paramaribo, Netherlands</div>

            </div>
            
          </div>

          <div class="fade-in">
            <form id="contact-form" class="card">
              <input type="text" id="name" placeholder="Your Name" required style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:2px; font-family:var(--font-body); font-size:0.9rem; background:var(--cream); color:var(--ink); margin-bottom:1rem;">
              <input type="email" id="email" placeholder="Your Email" required style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:2px; font-family:var(--font-body); font-size:0.9rem; background:var(--cream); color:var(--ink); margin-bottom:1rem;">
              <textarea id="message" rows="6" placeholder="Your Message" required style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:2px; font-family:var(--font-body); font-size:0.9rem; background:var(--cream); color:var(--ink); resize:vertical; margin-bottom:1rem;"></textarea>
              <button type="submit" class="btn btn-primary" style="width:100%;">
                Send Message <i class="fa-solid fa-paper-plane"></i>
              </button>
              <div id="form-status" style="margin-top:1rem;"></div>
            </form>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="foot-logo">DR<span>.</span></p>
      
      <nav class="foot-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="work.html">Work</a>
        <a href="contact.html">Contact</a>
      </nav>

    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
